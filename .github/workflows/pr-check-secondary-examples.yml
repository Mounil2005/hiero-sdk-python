name: Secondary PR Check - Examples
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "examples/**"
      - "src/**"
      - ".github/workflows/pr-check-secondary-examples.yml"
  pull_request:
    paths:
      - "examples/**"
      - "src/**"
      - ".github/workflows/pr-check-secondary-examples.yml"
  workflow_dispatch:

concurrency:
  group: examples-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run-examples:
    runs-on: ${{ (github.repository_owner != 'hiero-ledger' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork)) && 'ubuntu-latest' || 'hl-sdk-py-lin-md' }}
    timeout-minutes: 30
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - name: Install script dependencies
        run: npm install
        working-directory: .github/scripts

      - name: Test script
        run: npm test
        working-directory: .github/scripts

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Generate Proto Files
        run: uv run python generate_proto.py

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@692b186bd2e4c8d46b9deb1c067dc6ddcf0abcd7 #v0.15.0
        with:
          installMirrorNode: true

      - name: Run Examples
        env:
          OPERATOR_ID: ${{ steps.solo.outputs.accountId }}
          OPERATOR_KEY: ${{ steps.solo.outputs.privateKey }}
          CHAIN_ID: 012A
          NETWORK: solo
        run: node .github/scripts/pr-check-secondary-examples.js
